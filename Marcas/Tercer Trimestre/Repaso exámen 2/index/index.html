<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Index</title>
</head>
<body>
    <header class="head">
        <div class="indice">
            <div class="parte_toro">
                <img src="../img/logo.png" alt="logo_toro" class="toro">
                <div class="texto_toro">
                    <p class="letra_toro">ProRealTime</p>
                    <p class="letra_toro2">Software</p>
                </div>
            </div>
            <div class="parte_centro">
                <ul class="medio">
                    <li>Inicio</li>
                    <li>Productos</li>
                </ul>
            </div>

                <button class="boton1">Identificarse</button>

            </div>
        </div>
        <div class="parte_grafica">
            <div class="texto">
                <h1 class="eslogan">La Tecnología para un mejor Trading</h1>
                <p class="subeslogan">ProRealTime: programa de trading y gráficos</p>
            </div>

                <img src="../img/esta 1.png" alt="grafica" class="imagen">
