<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio</title>

    <style>

        .negrita {
            font-weight: bold;
        }

        .cursiva {
            font-style: italic;
        }

        .tachado {
            text-decoration: line-through;
        }

        .enfasis {
            font-style: italic;
        }

        .pequeno {
            font-size: 0.8em;
        }

        .subindice,
        .superindice {
            font-size: 0.8em;
        }

        .remarcado {
            background-color: yellow;
        }

    </style>
</head>
<body>
 Hola
    <br><br>

    <p><span class="negrita">Texto en negrita</span><br>
    <span class="cursiva">Texto en cursiva</span><br>
    <span class="tachado">Texto tachado</span><br>
    <span class="enfasis">Texto en enfasis</span><br>
    <span class="pequeno">Texto pequeño</span><br></p>

    <p>X<sub class="subindice">2</sub> y X<sup class="superindice">3</sup><br></p>

    <p><span class="remarcado">Texto remarcado</span><br>
    "Pequeña cita"<br>
    16:01<br>
    <span class="cursiva">Titulo de un articulo</span><br><br>

    Texto largo del articulo al que hacemos referencia
    <br><br>

    <span class="cursiva">Mfernanda Hoyuela</span><br>
    Vedruna.org<br><br>

    Sevilla<br>
    Hola<br>
    Adios</p>
</body>
</html>
