<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Artistas Favoritos</title>
    
    <link rel="stylesheet" href="tabla_marcas.css">

</head>
<body>

    <table class="music-table">
        <thead>
            <tr>
                <th scope="col">Foto</th>
                <th scope="col">Artista</th>
                <th scope="col">Género</th>
                <th scope="col">Álbum Icónico</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="Daft punk.jpg" alt="Daft Punk" class="artist-img">
                </td>
                <th scope="row">Daft Punk</th>
                <td>Electrónica / House</td>
                <td>Discovery</td>
            </tr>

            <tr>
                <td>
                    <img src="Coldplay.jpg" alt="Coldplay" class="artist-img">
                </td>
                <th scope="row">Coldplay</th>
                <td>Pop Rock / Alternativo</td>
                <td>A Rush of Blood to the Head</td>
            </tr>

            <tr>
                <td>
                    <img src="Rosalia.jpg" alt="Rosalía" class="artist-img">
                </td>
                <th scope="row">Rosalía</th>
                <td>Flamenco / Urbano</td>
                <td>El Mal Querer</td>
            </tr>

            <tr>
                <td>
                    <img src="Queen.jpg" alt="Queen" class="artist-img">
                </td>
                <th scope="row">Queen</th>
                <td>Rock Clásico</td>
                <td>A Night at the Opera</td>
            </tr>

            <tr>
                <td>
                    <img src="The Weeknd.jpg" alt="The Weeknd" class="artist-img">
                </td>
                <th scope="row">The Weeknd</th>
                <td>R&B / Synth-pop</td>
                <td>After Hours</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
